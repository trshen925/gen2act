# 6-DOF variant of droid_full_future5_delta_xyz_regression_proprio_frozen_dinov2_aug50.
# Changes vs the xyz-only experiment:
#   1. source_jitter: uniform 8-frame source sampling now wobbles +/-5 frames (train only).
#   2. pose_dims 3 -> 6: predict future delta xyz AND wrapped delta rotation; gripper head enabled.
#   3. regression targets normalized per-dim to [-1,1] (xyz clamped to +/-0.10m, rotation
#      wrapped to [-pi,pi] then clamped to +/-0.5rad). Predictions are un-normalized at inference.
# Data root points at the local droid-100-new copy; switch root + episode_glob for full droid-150.

experiment:
  name: droid100new_future5_delta_6dof_regression_proprio_frozen_dinov2_aug50
  output_dir: /mnt/pfs/users/shentingrui/code/robo/video_gen/gen2act/gen2act/outputs/droid100new_future5_delta_6dof_regression_proprio_frozen_dinov2_aug50

data:
  dataset_type: openx_droid
  root: /mnt/pfs/share/shentingrui/dataset/droid-100-new
  episode_glob: "[0-9][0-9][0-9][0-9]"
  source_video_name: first_last_i2v.mp4
  target_video_name: gt.mp4
  metadata_name: data.json
  source_sampling: linspace
  source_len: 8
  target_history_len: 4
  target_offset: 0
  future_horizon: 5
  image_size: 224
  action_stride: 10
  terminate_positive_window: 5
  val_ratio: 0.2
  split_seed: 42
  max_episodes: null
  max_windows: null
  gripper_threshold: 0.5
  source_jitter:
    enabled: true
    max_offset: 5
  window_jitter:
    enabled: true
    max_offset: 3
  augmentation:
    enabled: true
    p: 1.0
    brightness: 0.1
    contrast: 0.1
    saturation: 0.05
    noise_std: 0.01
  proprioception:
    enabled: true
    source: observations
    key: cartesian_position
    step: target
    dims: 6

action:
  dim: 7
  pose_dims: 6
  mode: regression
  regression_normalize: true
  num_bins: 64
  bounds_source: config
  bounds_low: [-0.10, -0.10, -0.10, -0.5, -0.5, -0.5]
  bounds_high: [0.10, 0.10, 0.10, 0.5, 0.5, 0.5]
  mapping:
    type: droid_observation_cartesian_future_delta_pose

model:
  backbone:
    name: dinov2_vitb14
    pretrained: true
    freeze: true
    local_checkpoint: ""
    allow_random_init: false
  image_size: 224
  source_len: 8
  target_history_len: 4
  latent_tokens: 8
  hidden_dim: 768
  resampler_layers: 1
  resampler_heads: 8
  fusion_heads: 8
  num_bins: 64
  pose_action_dims: 6
  proprioception_dim: 6
  point_tracking:
    enabled: false

train:
  seed: 42
  batch_size: 2
  epochs: 50
  num_workers: 4
  amp: false
  grad_clip_norm: 1.0
  shuffle: true
  optimizer:
    name: adamw
    lr: 0.0001
    backbone_lr_multiplier: 0.0
    weight_decay: 0.05
    betas: [0.9, 0.95]
  losses:
    action_weight: 1.0
    gripper_weight: 0.2
    terminate_weight: 0.0
    action_regression_loss: smooth_l1
    smooth_l1_beta: 0.1
  logging:
    log_every: 50
  debug:
    anomaly_detection: false
    debug_isfinite: false
    debug_norms: false
