# C30 continuation: start from the completed epoch-12 latest checkpoint and
# fine-tune for 12 additional epochs with a 4x lower learning rate.
# resume_checkpoint intentionally restores weights only; optimizer/scheduler
# restart for this low-LR phase. The frozen C28 train/val split is inherited.

_base_: droidexFULL_C30_dit16_mixer8_c28base.yaml

experiment:
  name: droidexFULL_C30_cont12_lr3e5
  output_dir: /mnt/pfs/users/shentingrui/code/robo/video_gen/gen2act/gen2act/outputs/droidexFULL_C30_cont12_lr3e5

train:
  resume_checkpoint: /mnt/pfs/users/shentingrui/code/robo/video_gen/gen2act/gen2act/outputs/droidexFULL_C30_dit16_mixer8_c28base/latest.pt
  epochs: 12
  optimizer:
    name: adamw
    lr: 0.00003
    backbone_lr_multiplier: 0.3
    llrd: 0.7
    weight_decay: 0.05
    betas: [0.9, 0.95]
  scheduler:
    name: cosine
    warmup_ratio: 0.05
    min_lr_ratio: 0.05

