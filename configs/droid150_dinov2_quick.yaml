experiment:
  name: droid150_dinov2_quick
  output_dir: /mnt/afs/shentingrui/code/dreamwheel/franka_dataset/robot2robot_gen2act/outputs/droid150_dinov2_quick

data:
  dataset_type: openx_droid
  root: /mnt/afs/shentingrui/data/droid-150
  episode_glob: "[0-9][0-9][0-9][0-9]"
  source_video_name: first_last_i2v.mp4
  target_video_name: gt.mp4
  metadata_name: data.json
  source_sampling: linspace
  source_len: 4
  target_history_len: 4
  target_offset: 0
  image_size: 224
  action_stride: 30
  terminate_positive_window: 5
  max_episodes: 6
  max_windows: 12
  val_ratio: 0.2
  split_seed: 42

action:
  dim: 7
  pose_dims: 6
  num_bins: 256
  bounds_source: config
  bounds_low: [0.247230663895607, -0.568376362323761, -0.16521209478378296, -3.141512155532837, -1.5491019487380981, -3.1378636360168457]
  bounds_high: [0.8506479263305664, 0.5075082778930664, 0.8757533431053162, 3.141587734222412, 1.0952130556106567, 3.1391701698303223]
  mapping:
    type: droid_action_dict_cartesian_position

model:
  backbone:
    name: dinov2_vitb14
    pretrained: true
    freeze: false
    local_checkpoint: ""
    allow_random_init: false
  image_size: 224
  source_len: 4
  target_history_len: 4
  latent_tokens: 8
  hidden_dim: 768
  resampler_layers: 2
  resampler_heads: 8
  fusion_heads: 8
  num_bins: 256
  pose_action_dims: 6
  point_tracking:
    enabled: false

train:
  seed: 42
  batch_size: 1
  epochs: 1
  num_workers: 0
  amp: true
  grad_clip_norm: 1.0
  shuffle: true
  optimizer:
    name: adamw
    lr: 0.0001
    backbone_lr_multiplier: 0.1
    weight_decay: 0.05
    betas: [0.9, 0.95]
  losses:
    action_weight: 1.0
    gripper_weight: 0.2
    terminate_weight: 0.1
  logging:
    log_every: 50
  debug:
    anomaly_detection: false
    debug_isfinite: false
    debug_norms: false
